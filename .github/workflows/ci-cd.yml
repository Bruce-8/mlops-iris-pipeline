name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --------------------
  # Continuous Integration
  # --------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out code
      - uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t my-fastapi-app .

      # 3. Run tests inside Docker
      - name: Run tests
        run: docker run --rm my-fastapi-app pytest /tests

  # --------------------
  # Continuous Deployment
  # --------------------
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      # 1. Check out code (optional, but good practice)
      - uses: actions/checkout@v4

      # 2. Trigger Render deploy
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl --request POST \
              --url https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys \
              --header 'accept: application/json' \
              --header "authorization: Bearer $RENDER_API_KEY" \
              --header 'content-type: application/json'